name: Fix BizOS signup links
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  fix:
    if: github.head_ref == 'fix-signup-auth-flow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-signup-auth-flow
          fetch-depth: 0
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('biz-os.html')
          s=p.read_text(encoding='utf-8')
          pairs=[
            ('data-en="Sign up for BizOS Starter" data-vi="Đăng ký BizOS Starter" href="app/signup.html"','data-en="Sign up for BizOS Starter" data-vi="Đăng ký BizOS Starter" href="app/signup.html?service=BIZOS&amp;plan=OS_LITE&amp;term=3"'),
            ('data-en="Request proposal" data-vi="Đăng ký BizOS Growth" href="#contact"','data-en="Sign up for BizOS Growth" data-vi="Đăng ký BizOS Growth" href="app/signup.html?service=BIZOS&amp;plan=OS_STANDARD&amp;term=6"'),
            ('data-en="Sign up for BizOS Scale" data-vi="Đăng ký BizOS Scale" href="app/signup.html"','data-en="Sign up for BizOS Scale" data-vi="Đăng ký BizOS Scale" href="app/signup.html?service=BIZOS&amp;plan=OS_PARTNER&amp;term=12"')
          ]
          for old,new in pairs:
            if s.count(old)!=1: raise SystemExit('BizOS link marker mismatch')
            s=s.replace(old,new,1)
          p.write_text(s,encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add biz-os.html
          git commit -m "Fix BizOS signup links"
          git push origin fix-signup-auth-flow
