[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY"

[functions]
  node_bundler = "esbuild"

[functions."subscription-maintenance"]
  schedule = "0 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https: data: blob:; connect-src 'self' https://sfuoaafqefpygvzhvagq.supabase.co wss://sfuoaafqefpygvzhvagq.supabase.co; frame-ancestors 'self';"

[[headers]]
  for = "/app/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Frame-Options = "DENY"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Frame-Options = "DENY"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
  [[redirects]]

  from = "/app/affiliate"
  to = "/app/affiliate-login.html"
  status = 302
  force = true  
[[redirects]]
  from = "/app/affiliate/"
  to = "/app/affiliate-login.html"
  status = 302
  force = true
[[redirects]]
  from = "/doitackinhdoanh/:slug"
  to = "/app/affiliate.html?slug=:slug"
  status = 200

[[redirects]]
  from = "/bizos"
  to = "/biz-os.html"
  status = 200

[[redirects]]
  from = "/bizhealth"
  to = "/bizhealth.html"
  status = 200

[[redirects]]
  from = "/bizdeal"
  to = "/biz-deal.html"
  status = 200
