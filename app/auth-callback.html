<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#071f3d"/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" type="image/png" href="../assets/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/vcpc.css"/>
<link rel="stylesheet" href="../assets/app-core.css"/>
<title>Xác nhận email · VCPC</title>
</head>
<body class="app">
<div class="auth-page">
  <aside class="auth-hero">
    <a href="../index.html" style="display:flex;gap:12px;align-items:center;color:#fff;text-decoration:none;">
      <img src="../assets/logo-vcpc.jpg" style="width:46px;height:46px;border-radius:10px;" alt="VCPC"/>
      <div><b style="color:#ffd36b;font-weight:800;">Viet Capital Partners &amp; Consulting</b><br/>
      <span style="font-size:11px;letter-spacing:.08em;color:#a9bbd2;text-transform:uppercase;">BizHealth · BizOS · BizDeal</span></div>
    </a>
    <div>
      <h1>Xác nhận email tài khoản VCPC.</h1>
      <p>Sau khi xác thực, hệ thống chuyển thẳng tới bước Tạo tổ chức; không cần đăng nhập lại.</p>
    </div>
    <div style="font-size:13px;color:#90a4c2;">© VCPC · vietcapitalpartner.com</div>
  </aside>
  <section class="auth-form-wrap">
    <div class="auth-form" id="callbackMsg">
      <div style="font-size:40px;margin-bottom:16px;" id="callbackIcon">⏳</div>
      <h2 id="callbackTitle">Đang xác thực email…</h2>
      <p id="callbackBody" style="color:#5b6b80;line-height:1.7;margin-top:10px;">Vui lòng không đóng trình duyệt.</p>
      <div id="callbackCta" style="display:none;margin-top:20px;gap:8px;"></div>
    </div>
  </section>
</div>
<script src="../assets/app-config.js"></script>
<script src="../assets/mock-backend.js"></script>
<script src="../assets/app-core.js"></script>
<script>
(function(){
'use strict';
var icon=document.getElementById('callbackIcon');
var title=document.getElementById('callbackTitle');
var body=document.getElementById('callbackBody');
var cta=document.getElementById('callbackCta');
var RULES={
  BIZHEALTH_STANDARD:{service:'BIZHEALTH',term:1,label:'BizHealth Standard'},
  BIZHEALTH_PREMIUM:{service:'BIZHEALTH',term:1,label:'BizHealth Premium'},
  OS_LITE:{service:'BIZOS',term:3,label:'BizOS Starter'},
  OS_STANDARD:{service:'BIZOS',term:6,label:'BizOS Growth'},
  OS_PARTNER:{service:'BIZOS',term:12,label:'BizOS Scale'}
};
function clean(v){return String(v||'').trim().toUpperCase();}
function log(error){
  var item={at:new Date().toISOString(),stage:'auth_callback_failed',message:String(error&&error.message||error||''),url:location.pathname+location.search};
  try{var rows=JSON.parse(localStorage.getItem('vcpc.auth.diagnostics.v1')||'[]');rows.push(item);localStorage.setItem('vcpc.auth.diagnostics.v1',JSON.stringify(rows.slice(-30)));}catch(e){}
  console.error('[VCPC auth callback]',item);
}
function fail(message){
  icon.textContent='❌';title.textContent='Không thể xác nhận tài khoản';body.textContent=message;
  cta.style.display='grid';
  cta.innerHTML='<a href="login.html" class="app-btn app-btn-primary">Đăng nhập →</a><a href="mailto:partner@vietcapitalpartners.com" class="app-btn app-btn-ghost">Liên hệ VCPC</a>';
}
try{
  var result=VCPC_DB.consumeAuthCallback?VCPC_DB.consumeAuthCallback():null;
  if(result&&result.error)throw new Error(result.error);
  if(window.history&&window.history.replaceState&&window.location.hash){window.history.replaceState({},document.title,window.location.pathname+window.location.search);}
  var user=VCPC_DB.currentUser();
  if(!user)throw new Error('Link xác nhận không hợp lệ, đã hết hạn hoặc phiên xác thực không được tạo.');
  var meta=Object.assign({},user.user_metadata||{});
  try{meta=Object.assign(meta,JSON.parse(localStorage.getItem('vcpc.pending.signup')||'{}')||{});}catch(e){}
  var q=new URLSearchParams(window.location.search);
  var planCode=clean(q.get('plan')||meta.plan_code||'');
  var selected=RULES[planCode]||null;
  var destination=new URL('/app/onboarding.html',window.location.origin);
  var msg='Email đã được xác thực. Bạn đang được chuyển tới bước Tạo tổ chức.';
  if(selected){
    destination.searchParams.set('service',selected.service);
    destination.searchParams.set('plan',planCode);
    destination.searchParams.set('term',String(selected.term));
    msg='Email đã được xác thực. Gói '+selected.label+' sẽ được chọn sẵn tại bước Tạo tổ chức.';
  }
  icon.textContent='✅';title.textContent='Xác nhận email thành công!';body.textContent=msg;
  setTimeout(function(){window.location.replace(destination.href);},700);
}catch(error){
  log(error);
  fail(error&&error.message?error.message:'Không thể kích hoạt tài khoản. Vui lòng thử lại.');
}
})();
</script>
</body>
</html>
