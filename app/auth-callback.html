<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#071f3d"/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" type="image/png" href="../assets/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/vcpc.css"/>
<link rel="stylesheet" href="../assets/app-core.css"/>
<title>Xác nhận email · VCPC</title>
</head>
<body class="app">
<div class="auth-page">
  <aside class="auth-hero">
    <a href="../index.html" style="display:flex;gap:12px;align-items:center;color:#fff;text-decoration:none;">
      <img src="../assets/logo-vcpc.jpg" style="width:46px;height:46px;border-radius:10px;" alt="VCPC"/>
      <div><b style="color:#ffd36b;font-weight:800;">Viet Capital Partners &amp; Consulting</b><br/>
      <span style="font-size:11px;letter-spacing:.08em;color:#a9bbd2;text-transform:uppercase;">Advisory Platform</span></div>
    </a>
    <div>
      <h1>Xác nhận email tài khoản VCPC.</h1>
      <p>Sau khi xác thực, hệ thống sẽ chuyển tới bước Tạo tổ chức và chọn dịch vụ.</p>
    </div>
    <div style="font-size:13px;color:#90a4c2;">© VCPC · vietcapitalpartner.com</div>
  </aside>

  <section class="auth-form-wrap">
    <div class="auth-form" id="callbackMsg">
      <div style="font-size:40px;margin-bottom:16px;" id="callbackIcon">⏳</div>
      <h2 id="callbackTitle">Đang xác thực email…</h2>
      <p id="callbackBody" style="color:#5b6b80;line-height:1.7;margin-top:10px;">Vui lòng không đóng trình duyệt.</p>
      <div id="callbackCta" style="display:none;margin-top:20px;gap:8px;"></div>
    </div>
  </section>
</div>

<script src="../assets/app-config.js"></script>
<script src="../assets/mock-backend.js"></script>
<script src="../assets/app-core.js"></script>
<script>
(function(){
'use strict';
var icon=document.getElementById('callbackIcon');
var title=document.getElementById('callbackTitle');
var body=document.getElementById('callbackBody');
var cta=document.getElementById('callbackCta');
var PLAN_CONFIG={
  BIZHEALTH_STANDARD:{service:'BIZHEALTH',term:1,label:'BizHealth Standard'},
  BIZHEALTH_PREMIUM:{service:'BIZHEALTH',term:1,label:'BizHealth Premium'},
  OS_LITE:{service:'BIZOS',term:3,label:'BizOS Starter'},
  OS_STANDARD:{service:'BIZOS',term:6,label:'BizOS Growth'},
  OS_PARTNER:{service:'BIZOS',term:12,label:'BizOS Scale'}
};

function ok(message,destination){
  icon.textContent='✅';
  title.textContent='Xác nhận email thành công!';
  body.textContent=message;
  setTimeout(function(){window.location.replace(destination);},1100);
}
function fail(message){
  icon.textContent='❌';
  title.textContent='Không thể xác nhận tài khoản';
  body.textContent=message;
  cta.style.display='grid';
  cta.innerHTML='<a href="login.html" class="app-btn app-btn-primary">Đăng nhập lại →</a><a href="mailto:partner@vietcapitalpartners.com" class="app-btn app-btn-ghost">Liên hệ VCPC</a>';
}
function clean(value){return String(value||'').trim().toUpperCase();}

try{
  var callbackResult=VCPC_DB.consumeAuthCallback?VCPC_DB.consumeAuthCallback():null;
  if(callbackResult&&callbackResult.error)throw new Error(callbackResult.error);

  /* Remove access/refresh tokens from the visible address after the adapter
     has stored the session. Keep normal query parameters such as plan. */
  if(window.history&&window.history.replaceState&&window.location.hash){
    window.history.replaceState({},document.title,window.location.pathname+window.location.search);
  }

  var user=VCPC_DB.currentUser();
  if(!user)throw new Error('Link xác nhận không hợp lệ hoặc đã hết hạn.');

  var metadata=user.user_metadata||{};
  var query=new URLSearchParams(window.location.search);
  var requestedPlan=clean(query.get('plan')||metadata.plan_code||'');
  var selected=PLAN_CONFIG[requestedPlan]||null;

  var completed=VCPC_DB.completePendingSignup?VCPC_DB.completePendingSignup():{ok:true};
  if(completed&&completed.error)throw new Error(completed.error);

  var destination=new URL('/app/onboarding.html',window.location.origin);
  var message='Email đã được xác thực. Vui lòng tạo tổ chức và chọn dịch vụ để tiếp tục.';

  if(selected){
    destination.searchParams.set('service',selected.service);
    destination.searchParams.set('plan',requestedPlan);
    destination.searchParams.set('term',String(selected.term));
    message='Email đã được xác thực. Gói '+selected.label+' đã được chọn sẵn; bạn vẫn có thể thay đổi tại bước Tạo tổ chức.';
  }

  ok(message,destination.href);
}catch(error){
  console.error('VCPC auth callback error:',error);
  fail(error&&error.message?error.message:'Không thể kích hoạt tài khoản. Vui lòng thử lại.');
}
})();
</script>
</body>
</html>
