<!DOCTYPE html>
<html lang="vi">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#071f3d"/><link rel="icon" type="image/png" href="../assets/favicon.png"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/><link rel="stylesheet" href="../assets/vcpc.css"/><link rel="stylesheet" href="../assets/app-core.css"/><title>Onboarding · VCPC Auto</title></head>
<body class="app" data-require="auth">
<main class="app-main" style="max-width:920px;margin:0 auto;padding:40px 22px 60px;">
  <div class="app-stepper">
    <div class="app-step active"><span class="num">1</span><span data-vi="Tạo tổ chức &amp; chọn gói" data-en="Org &amp; plan">Tạo tổ chức &amp; chọn gói</span></div>
    <div class="app-step"><span class="num">2</span><span data-vi="Khai báo nhu cầu" data-en="Intake">Khai báo nhu cầu</span></div>
    <div class="app-step"><span class="num">3</span><span data-vi="Kiểm tra dữ liệu" data-en="Data check">Kiểm tra dữ liệu</span></div>
    <div class="app-step"><span class="num">4</span><span data-vi="Phạm vi &amp; báo giá" data-en="Scope &amp; quote">Phạm vi &amp; báo giá</span></div>
    <div class="app-step"><span class="num">5</span><span data-vi="Thanh toán" data-en="Payment">Thanh toán</span></div>
    <div class="app-step"><span class="num">6</span><span data-vi="Dashboard" data-en="Dashboard">Dashboard</span></div>
  </div>

  <div class="app-card">
    <h1 class="app-title" data-vi="Tạo tổ chức &amp; chọn dịch vụ" data-en="Create your organization &amp; pick a service">Tạo tổ chức &amp; chọn dịch vụ</h1>
    <p class="app-sub" data-vi="Thông tin tổ chức để đăng ký sử dụng giải pháp của chúng tôi." data-en="Organization information to register for our solutions.">Thông tin tổ chức để đăng ký sử dụng giải pháp của chúng tôi.</p>

    <form id="orgForm" class="app-form" style="max-width:none;margin-top:22px;display:grid;grid-template-columns:1fr 1fr;gap:18px;">
      <div><label data-vi="Tên pháp lý" data-en="Legal name">Tên pháp lý</label><input name="legal_name" required placeholder="Công ty CP …"/></div>
      <div><label data-vi="Tên thương mại" data-en="Trade name">Tên thương mại</label><input name="trade_name" placeholder="…"/></div>
      <div><label data-vi="MST" data-en="Tax ID">MST</label><input name="tax_id" placeholder="0123456789"/></div>
      <div><label data-vi="Ngành" data-en="Industry">Ngành</label><select name="industry">
        <option value="retail_apparel">Bán lẻ thời trang</option><option value="fnb">F&amp;B / Dịch vụ ăn uống</option><option value="retail_general">Bán lẻ khác</option><option value="clinic_spa">Clinic / Spa / Nha khoa</option><option value="manufacturing">Sản xuất</option><option value="distribution">Phân phối / Thương mại</option><option value="service">Dịch vụ khác</option>
      </select></div>
      <div><label data-vi="Khoảng doanh thu (tỷ VND)" data-en="Revenue band (VND B)">Khoảng doanh thu</label><select name="revenue_band">
        <option value="under_50">Dưới 50 tỷ</option><option value="50_300">50–300 tỷ</option><option value="over_300">Trên 300 tỷ</option>
      </select></div>
      <div><label data-vi="Số chi nhánh" data-en="Branches">Số chi nhánh</label><input name="branches" type="number" min="0" value="1"/></div>
      <div><label data-vi="Số nhân sự" data-en="Employees">Số nhân sự</label><input name="employees" type="number" min="0" value="10"/></div>
      <div><label data-vi="Vùng / địa bàn chính" data-en="Primary regions">Vùng / địa bàn chính</label><input name="regions" placeholder="HCM, Hà Nội, Đà Nẵng"/></div>
    </form>

    <h2 style="font-size:18px;margin:28px 0 12px;color:#071f3d;font-weight:900;" data-vi="Chọn nhóm dịch vụ" data-en="Pick a service line">Chọn nhóm dịch vụ</h2>
    <div id="groupGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"></div>

    <div id="serviceWrap" style="display:none;margin-top:22px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <h2 style="font-size:18px;margin:0;color:#071f3d;font-weight:900;" id="serviceTitle" data-vi="Chọn gói dịch vụ" data-en="Pick a plan">Chọn gói dịch vụ</h2>
        <button type="button" id="changeGroup" class="app-btn app-btn-ghost" style="font-size:12.5px;padding:8px 14px;" data-vi="← Đổi nhóm" data-en="← Change line">← Đổi nhóm</button>
      </div>
      <div id="planGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;"></div>
    </div>

    <h2 style="font-size:18px;margin:28px 0 12px;color:#071f3d;font-weight:900;" data-vi="Cam kết" data-en="Consent">Cam kết</h2>
    <div style="display:grid;gap:8px;">
      <label style="display:flex;gap:10px;align-items:flex-start;"><input type="checkbox" name="c1" required/><span data-vi="Tôi có quyền cung cấp các dữ liệu được upload." data-en="I have the right to provide the uploaded data.">Tôi có quyền cung cấp các dữ liệu được upload.</span></label>
      <label style="display:flex;gap:10px;align-items:flex-start;"><input type="checkbox" name="c2" required/><span data-vi="Tôi đồng ý cho VCPC xử lý dữ liệu để phục vụ dịch vụ" data-en="I consent to VCPC processing the data for our services.">Tôi đồng ý cho VCPC xử lý dữ liệu để phục vụ dịch vụ</span></label>
      <label style="display:flex;gap:10px;align-items:flex-start;"><input type="checkbox" name="c3" required/><span data-vi="Tôi hiểu kết quả phụ thuộc chất lượng dữ liệu được cung cấp." data-en="I understand the output depends on data quality.">Tôi hiểu kết quả phụ thuộc chất lượng dữ liệu được cung cấp.</span></label>

    </div>

    <div style="display:flex;justify-content:space-between;gap:16px;margin-top:30px;flex-wrap:wrap;">
      <a class="app-btn app-btn-ghost" href="login.html" data-vi="← Quay lại" data-en="← Back">← Quay lại</a>
      <button id="continueBtn" class="app-btn app-btn-primary" data-vi="Tiếp tục" data-en="Continue">Tiếp tục</button>
    </div>
  </div>
</main>
<script src="../assets/i18n/loader.js" data-i18n-base="../assets/i18n"></script><script src="../assets/app-config.js"></script><script src="../assets/mock-backend.js"></script><script src="../assets/guards.js"></script><script src="../assets/app-core.js"></script>
<script>
if (!VCPC_DB.currentUser()) window.location.href = 'login.html';
const isEN = function(){ return (window.VCPC_I18N&&VCPC_I18N.current)==='en'; };
const params = new URLSearchParams(location.search);
let plansData = null;
let existingEng = VCPC_DB.currentEngagement();
let selected = params.get('plan') || (existingEng && existingEng.plan_code) || null;
let selectedTerm = Number(params.get('term') || (existingEng && existingEng.billing_term) || 3);
let groupSel = null;
if (selected && selected.startsWith('BIZHEALTH') && selected !== 'BIZHEALTH_FREE') groupSel = 'bizhealth';
else if (selected && selected.startsWith('OS_')) groupSel = 'strategy_os';
else selected = null;

async function loadPlans(){
  plansData = await fetch('../assets/plans.json',{cache:'no-cache'}).then(r=>r.json());
  renderGroups(); renderPlans();
}
function L(o){ const lang = (VCPC_I18N && VCPC_I18N.current) || 'vi'; return o[lang] || o.vi; }
const GROUPS = [
  { key:'bizhealth', label:{vi:'BizHealth', en:'BizHealth'}, icon:'🩺', desc:{vi:'Chẩn đoán sức khỏe kinh doanh: lời/lỗ thật, dòng tiền, rò rỉ chi phí — báo cáo + dashboard 90 ngày.', en:'Business health diagnostic: true P&L, cash, cost leakage — report + 90-day dashboard.'} },
  { key:'strategy_os', label:{vi:'BizOS', en:'BizOS'}, icon:'📊', desc:{vi:'Dashboard điều hành theo thuê bao: KPI, cảnh báo, market intelligence, đồng hành thực thi.', en:'Subscription operating dashboard: KPIs, alerts, market intelligence, execution.'} }
];
function renderGroups(){
  document.getElementById('groupGrid').innerHTML = GROUPS.map(function(g){
    const active = g.key === groupSel;
    return '<button type="button" data-group="'+g.key+'" class="app-card" style="border:'+(active?'2px solid #ffb20a':'1px solid rgba(7,31,61,.10)')+';padding:20px;text-align:left;background:'+(active?'#fff8e8':'#fff')+';cursor:pointer;display:flex;gap:14px;align-items:flex-start;"><span style="font-size:30px;line-height:1;">'+g.icon+'</span><span><span style="display:block;font-size:18px;font-weight:900;color:#071f3d;">'+L(g.label)+'</span><span style="display:block;font-size:13px;color:#5b6b80;margin-top:5px;line-height:1.5;">'+L(g.desc)+'</span></span></button>';
  }).join('');
  document.getElementById('serviceWrap').style.display = groupSel ? 'block' : 'none';
}
function renderPlans(){
  if (!groupSel || !plansData) return;
  let list = (groupSel==='bizhealth' ? plansData.bizhealth : plansData.strategy_os).filter(function(p){ return p.code !== 'BIZHEALTH_FREE'; });
  document.getElementById('serviceTitle').textContent = isEN() ? ('Pick a '+(groupSel==='bizhealth'?'BizHealth':'BizOS')+' plan') : ('Chọn gói '+(groupSel==='bizhealth'?'BizHealth':'BizOS'));
  document.getElementById('planGrid').innerHTML = list.map(function(p){
    const active=p.code===selected;
    return '<button type="button" data-plan="'+p.code+'" class="app-card" style="border:'+(active?'2px solid #ffb20a':'1px solid rgba(7,31,61,.10)')+';padding:16px;text-align:left;background:'+(active?'#fff8e8':'#fff')+';cursor:pointer;"><small style="font-size:10px;font-weight:900;color:#7a5400;letter-spacing:.08em;text-transform:uppercase;">'+L(p.product_label)+'</small><div style="font-size:17px;font-weight:900;color:#071f3d;margin:6px 0;">'+L(p.name)+'</div><div style="font-size:12.5px;color:#5b6b80;">'+L(p.audience)+'</div><div style="margin-top:10px;font-size:11.5px;color:#41546b;">'+(isEN()?'Min. data score':'Điểm dữ liệu tối thiểu')+' '+p.dqs_threshold+'</div></button>';
  }).join('');
}
document.getElementById('groupGrid').addEventListener('click',function(e){const b=e.target.closest('[data-group]');if(!b)return;groupSel=b.getAttribute('data-group');selected=null;renderGroups();renderPlans();});
document.getElementById('changeGroup').addEventListener('click',function(){groupSel=null;selected=null;renderGroups();});
document.getElementById('planGrid').addEventListener('click',function(e){const b=e.target.closest('[data-plan]');if(!b)return;selected=b.getAttribute('data-plan');renderPlans();});
document.addEventListener('vcpc:langchange',function(){renderGroups();renderPlans();});

document.getElementById('continueBtn').addEventListener('click',function(){
  const f=document.getElementById('orgForm');
  if(!f.checkValidity()){f.reportValidity();return;}
  if(!selected){alert(isEN()?'Please pick a service plan.':'Vui lòng chọn một gói dịch vụ.');return;}
  const data=Object.fromEntries(new FormData(f).entries());
  const u=VCPC_DB.currentUser();
  let org=VCPC_DB.currentOrg();
  if(!org){
    org=VCPC_DB.insert('organizations',{owner_id:u.id,name:data.trade_name||data.legal_name,tax_id:data.tax_id||null,industry:data.industry||null,size:data.size||null,contact_name:data.contact_name||null,contact_email:data.contact_email||u.email,contact_phone:data.contact_phone||null,website:data.website||null});
    VCPC_DB.insert('organization_members',{organization_id:org.id,user_id:u.id,email:u.email,name:u.full_name||u.name||'',role:'owner',status:'active',activated_at:Date.now()});
  }else{
    org=VCPC_DB.upsert('organizations',Object.assign({},org,{name:data.trade_name||data.legal_name||org.name,tax_id:data.tax_id||org.tax_id||null,industry:data.industry||org.industry||null,size:data.size||org.size||null,contact_name:data.contact_name||org.contact_name||null,contact_email:data.contact_email||org.contact_email||u.email,contact_phone:data.contact_phone||org.contact_phone||null,website:data.website||org.website||null}));
  }
  VCPC_DB.setCurrentOrg(org);
  const all=[].concat(plansData.bizhealth||[],plansData.strategy_os||[]);
  const plan=all.find(function(x){return x.code===selected;});
  const term=plan&&plan.billing_type==='monthly'?(selectedTerm===6||selectedTerm===12?selectedTerm:3):1;
  const price=plan&&plan.price&&Number(plan.price.vnd||0);
  const termPct=term===6?10:term===12?15:0;
  const base=price*term;
  const afterTerm=Math.round(base*(1-termPct/100));
  let eng=existingEng;
  const payload={organization_id:org.id,owner_id:u.id,plan_code:selected,product:selected.startsWith('BIZHEALTH')?'bizhealth':'strategy_os',billing_term:term,state:'INTAKE',monthly_price:price,base_amount:base,term_discount_percent:termPct,term_discount_amount:base-afterTerm,final_amount:afterTerm,deposit_percent:20,deposit_amount:Math.round(afterTerm*.2),balance_amount:Math.round(afterTerm*.8),intake:(eng&&eng.intake)||{}};
  if(eng&&eng.id) eng=VCPC_DB.upsert('engagements',Object.assign({},eng,payload));
  else eng=VCPC_DB.insert('engagements',payload);
  VCPC_DB.setCurrentEngagement(eng);
  VCPC_DB.audit('ORG_ONBOARDING_UPDATED',{organization_id:org.id,engagement_id:eng.id});
  VCPC_DB.audit('PLAN_SELECTED',{organization_id:org.id,engagement_id:eng.id,plan_code:selected,billing_term:term});
  window.location.href='intake.html';
});
loadPlans();
</script>
</body>
</html>
